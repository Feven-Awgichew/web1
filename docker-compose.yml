version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: asmis_db
    ports:
      - "5433:5432"

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/asmis_db
      - JWT_SECRET=asmis_secret_key_2026
    ports:
      - "5000:5000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
